<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What's Your Cat's Personality? | Friskies Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  :root {

    --cream-dark: #F5EBD6;
    --red: #E63946;
    --red-dark: #C1121F;
    --ink: #1F1A17;
    --ink-soft: #4A3F38;
    --muted: #8A7E74;
    --white: #FFFFFF;
    --border: rgba(31, 26, 23, 0.12);
    --shadow-sm: 0 2px 8px rgba(31, 26, 23, 0.06);
    --shadow-md: 0 8px 24px rgba(31, 26, 23, 0.08);
    --shadow-lg: 0 20px 48px rgba(31, 26, 23, 0.12);
  }

  html, body {
    height: 100%;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:

    z-index: 0;
  }

  .wrap {

    z-index: 1;

    margin: 0 auto;
    padding: 2rem 1.25rem 3rem;
    min-height: 100vh;

  /* ===== Header ===== */
  .brand {

    margin-bottom: 2rem;
  }

  .brand-tag {

    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--red);
    background: rgba(230, 57, 70, 0.08);
    padding: 6px 14px;
    border-radius: 100px;
    margin-bottom: 16px;

  .brand h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 40px;
    line-height: 1.05;
    letter-spacing: -1px;
    color: var(--ink);
    margin-bottom: 10px;
  }

  .brand h1 em {
    font-style: italic;
    color: var(--red);
  }

  .brand p {
    font-size: 16px;
    color: var(--ink-soft);
    max-width: 420px;
    margin: 0 auto;
  }

  /* ===== Start Screen ===== */
  .start-card {
    background: var(--white);
    border-radius: 24px;
    padding: 2.5rem 2rem;

    text-align: center;
    position: relative;
    overflow: hidden;

  .start-illus {
    font-family: 'Fraunces', serif;
    font-size: 96px;
    line-height: 1;
    margin-bottom: 1rem;
    user-select: none;
  }

  .start-card h2 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 28px;
    margin-bottom: 12px;
    letter-spacing: -0.5px;
  }

  .start-card p {
    color: var(--ink-soft);
    font-size: 15px;
    margin-bottom: 1.75rem;
    max-width: 380px;
    margin-left: auto;
    margin-right: auto;
  }

  .meta-row {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }

  .meta-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--muted);
    font-weight: 500;
  }

  .meta-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--red);
  }

  .btn-primary {
    width: 100%;
    padding: 18px 24px;
    font-family: inherit;
    font-size: 16px;
    font-weight: 600;
    background: var(--red);
    color: white;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 4px 16px rgba(230, 57, 70, 0.25);

    box-shadow: 0 8px 24px rgba(230, 57, 70, 0.35);
  }

    justify-content: space-between;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .progress-bar {
    height: 6px;
    background: var(--cream-dark);
    border-radius: 100px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--red) 0%, #F4A261 100%);
    border-radius: 100px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* ===== Question Card ===== */
  .q-card {
    background: var(--white);
    border-radius: 24px;
    padding: 2rem 1.75rem;
    box-shadow: var(--shadow-md);
    animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }

  .q-number {
    display: inline-block;
    font-family: 'Fraunces', serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--red);
    margin-bottom: 12px;
  }

  .q-text {
    font-family: 'Fraunces', serif;
    font-size: 24px;
    font-weight: 600;
    line-height: 1.3;
    letter-spacing: -0.3px;
    margin-bottom: 1.75rem;
    color: var(--ink);
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option {
    width: 100%;
    text-align: left;
    padding: 18px 20px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 500;
    background: var(--cream);
    border: 2px solid transparent;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .option::before {
    content: '';
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: white;
    flex-shrink: 0;
    transition: all 0.2s ease;
  }

  .option:hover {
    background: white;
    border-color: var(--red);
    transform: translateX(4px);
  }

  .option:hover::before {
    border-color: var(--red);
    background: rgba(230, 57, 70, 0.1);
  }

  /* ===== Result Screen ===== */
  .result {
    animation: fadeUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }

    color: white;
    text-align: center;
    margin-bottom: 1.5rem;
    box-shadow: var(--shadow-lg);
    position: relative;
    overflow: hidden;
  }

    content: '';

    top: -50%;
    right: -20%;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);

    text-transform: uppercase;

    margin-bottom: 12px;

    font-size: 64px;
    line-height: 1;
    margin-bottom: 12px;

  .result-name {
    font-family: 'Fraunces', serif;
    font-size: 36px;
    font-weight: 600;
    letter-spacing: -0.5px;
    line-height: 1.1;
    margin-bottom: 16px;
    position: relative;
  }

  .result-desc {
    font-size: 16px;
    line-height: 1.6;
    opacity: 0.95;
    max-width: 420px;
    margin: 0 auto;

    padding: 2rem 1.75rem;
    box-shadow: var(--shadow-md);

    text-align: center;
    margin-bottom: 1.75rem;

  .food-title {
    font-family: 'Fraunces', serif;
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.3px;
    margin-bottom: 8px;

  .food-subtitle {
    font-size: 14px;
    color: var(--ink-soft);
  }

  .tiers {
    display: flex;
    flex-direction: column;
    gap: 14px;

  .tier {
    background: var(--cream);
    border-radius: 16px;
    padding: 1.25rem 1.25rem 1.25rem 1.5rem;
    border-left: 4px solid var(--border);
    transition: all 0.2s ease;
    position: relative;

  .tier:hover {
    transform: translateX(4px);
    box-shadow: var(--shadow-sm);
  }

  .tier-budget { border-left-color: #8FB88E; }
  .tier-mid { border-left-color: #F4A261; }
  .tier-premium { border-left-color: var(--red); }

  .tier-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
    gap: 8px;
  }

  .tier-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  .tier-budget .tier-label { color: #5A8759; }
  .tier-mid .tier-label { color: #C97820; }
  .tier-premium .tier-label { color: var(--red); }

  .tier-price {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
  }

  .tier-name {
    font-family: 'Fraunces', serif;
    font-size: 17px;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 6px;
    color: var(--ink);
  }

  .tier-why {
    font-size: 13px;
    line-height: 1.5;
    color: var(--ink-soft);
  }

  /* ===== Actions ===== */
  .actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .btn-secondary {
    width: 100%;
    padding: 16px 20px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    background: white;
    color: var(--ink);
    border: 2px solid var(--border);
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .btn-secondary:hover {
    border-color: var(--red);
    color: var(--red);
  }

  .footer-note {
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    margin-top: 1.5rem;
    padding: 0 1rem;
  }

  /* ===== Responsive ===== */
  @media (max-width: 480px) {
    .wrap { padding: 1.25rem 1rem 2rem; }
    .brand h1 { font-size: 32px; }
    .brand p { font-size: 14px; }
    .start-card, .q-card, .food-section { padding: 1.5rem 1.25rem; }
    .start-illus { font-size: 72px; }
    .start-card h2 { font-size: 22px; }
    .q-text { font-size: 20px; }
    .result-hero { padding: 2rem 1.25rem; }
    .result-name { font-size: 28px; }
    .result-emoji { font-size: 52px; }
    .option { padding: 16px; font-size: 14px; }
  }
</style>
</head>

    desc: "Vocal, assertive, fully in charge of the household. You don't own this cat — this cat owns you, and you love it.",
    foods: {
      budget:  { name: "Friskies Seafood Sensations Dry Cat Food", price: "~$0.18/day", why: "Keeps the bowl stocked for a Boss who expects food to be ready on demand. 24/7 buffet." },
      mid:     { name: "Friskies Extra Gravy Paté Variety Pack", price: "~$0.65/day", why: "Extra gravy means extra drama. A Boss wants every meal to feel like an event." },
      premium: { name: "Friskies Prime Filets + Lil' Shakes Combo", price: "~$1.30/day", why: "Real filets plus a lickable shake — a full multi-course service. The Boss has spoken." }
    }
  }
};

/* ============ RENDER LOGIC ============ */
const app = document.getElementById('app');
let state = { screen: 'start', step: 0, tags: [] };

function render() {
  if (state.screen === 'start') renderStart();
  else if (state.screen === 'quiz') renderQuestion();
  else if (state.screen === 'result') renderResult();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderStart() {
  app.innerHTML = `
    <div class="start-card">
      <div class="start-illus">🐾</div>
      <h2>Ready to meet your cat's true self?</h2>
      <p>A 2-minute personality test that pairs your cat with the Friskies food that fits them best.</p>
      <div class="meta-row">
        <div class="meta-item"><span class="meta-dot"></span>9 questions</div>
        <div class="meta-item"><span class="meta-dot"></span>10 archetypes</div>
        <div class="meta-item"><span class="meta-dot"></span>3 food picks</div>
      </div>
      <button class="btn-primary" onclick="startQuiz()">Start the quiz</button>
    </div>
  `;
}

function startQuiz() {
  state = { screen: 'quiz', step: 0, tags: [] };
  render();
}

function renderQuestion() {
  const q = QUESTIONS[state.step];
  const pct = Math.round((state.step / QUESTIONS.length) * 100);
  app.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-label">
        <span>Question ${state.step + 1} of ${QUESTIONS.length}</span>
        <span>${pct}%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width: ${pct}%"></div></div>
    </div>
    <div class="q-card">
      <div class="q-number">Q${state.step + 1}</div>
      <div class="q-text">${q.q}</div>
      <div class="options">
        ${q.options.map((opt, i) => `
          <button class="option" onclick="pickOption(${i})">${opt.label}</button>
        `).join('')}
      </div>
    </div>
  `;
}

function pickOption(i) {
  const q = QUESTIONS[state.step];
  state.tags = state.tags.concat(q.options[i].tags);
  state.step++;
  if (state.step >= QUESTIONS.length) {
    state.screen = 'result';
  }
  render();
}

function getResult() {
  const counts = {};
  state.tags.forEach(t => { counts[t] = (counts[t] || 0) + 1; });
  // Only count tags that are actually archetypes
  const scored = Object.keys(ARCHETYPES).map(k => ({ k, n: counts[k] || 0 }));
  scored.sort((a, b) => b.n - a.n);
  return ARCHETYPES[scored[0].k];
}

function renderResult() {
  const r = getResult();
  app.innerHTML = `
    <div class="result">
      <div class="result-hero">
        <div class="result-eyebrow">Your cat is...</div>
        <div class="result-emoji">${r.emoji}</div>
        <div class="result-name">${r.name}</div>
        <div class="result-desc">${r.desc}</div>
      </div>

      <div class="food-section">
        <div class="food-header">
          <div class="food-title">Food picks for your cat</div>
          <div class="food-subtitle">Three Friskies options at every budget</div>
        </div>
        <div class="tiers">
          <div class="tier tier-budget">
            <div class="tier-head">
              <div class="tier-label">Budget</div>
              <div class="tier-price">${r.foods.budget.price}</div>
            </div>
            <div class="tier-name">${r.foods.budget.name}</div>
            <div class="tier-why">${r.foods.budget.why}</div>
          </div>
          <div class="tier tier-mid">
            <div class="tier-head">
              <div class="tier-label">Mid-tier</div>
              <div class="tier-price">${r.foods.mid.price}</div>
            </div>
            <div class="tier-name">${r.foods.mid.name}</div>
            <div class="tier-why">${r.foods.mid.why}</div>
          </div>
          <div class="tier tier-premium">
            <div class="tier-head">
              <div class="tier-label">Premium</div>
              <div class="tier-price">${r.foods.premium.price}</div>
            </div>
            <div class="tier-name">${r.foods.premium.name}</div>
            <div class="tier-why">${r.foods.premium.why}</div>
          </div>
        </div>
      </div>

      <div class="actions">
        <button class="btn-secondary" onclick="shareResult('${r.name.replace(/'/g, "\\'")}')">Share my result</button>
        <button class="btn-primary" onclick="resetQuiz()">Take the quiz again</button>
      </div>
    </div>
  `;
}

function resetQuiz() {
  state = { screen: 'start', step: 0, tags: [] };
  render();
}

function shareResult(name) {
  const text = `My cat is "${name}" according to the Friskies Cat Personality Quiz! 🐾`;
  if (navigator.share) {
    navigator.share({ title: 'Cat Personality Quiz', text, url: window.location.href }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text + ' ' + window.location.href).then(() => {
      alert('Copied to clipboard!');
    });
  }
}

render();
</script>
</body>
</html>
